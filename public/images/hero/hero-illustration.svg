<svg viewBox="0 0 640 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a healthy home-style meal thali box">
  <defs>
    <linearGradient id="blobGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C8C5A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2F855A" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>

  <!-- Background blob -->
  <path d="M120 90C220 20 420 10 500 100C580 190 560 340 480 420C400 500 220 520 120 440C20 360 20 160 120 90Z" fill="url(#blobGrad)"/>

  <!-- Floating dots -->
  <circle cx="90" cy="480" r="10" fill="#1C8C5A" opacity="0.25"/>
  <circle cx="560" cy="120" r="14" fill="#2F855A" opacity="0.2"/>
  <circle cx="580" cy="440" r="7" fill="#1C8C5A" opacity="0.3"/>

  <!-- Steam -->
  <path d="M280 130c-10-16 6-24 0-40" stroke="#1C8C5A" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <path d="M320 120c-10-16 6-26 0-42" stroke="#1C8C5A" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <path d="M360 130c-10-16 6-24 0-40" stroke="#1C8C5A" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

  <!-- Tiffin/thali box shadow -->
  <ellipse cx="320" cy="470" rx="190" ry="26" fill="#1A202C" opacity="0.06"/>

  <!-- Main round thali plate -->
  <circle cx="320" cy="300" r="190" fill="url(#boxGrad)" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="320" cy="300" r="164" fill="#FFFFFF" stroke="#EDF2F7" stroke-width="2"/>

  <!-- Compartments -->
  <path d="M320 136v328M156 300h328" stroke="#EDF2F7" stroke-width="10"/>

  <!-- Rice bowl (top-left) -->
  <circle cx="245" cy="225" r="58" fill="#FFF7E6"/>
  <ellipse cx="245" cy="210" rx="46" ry="30" fill="#FDEBC8"/>
  <circle cx="225" cy="200" r="5" fill="#F6D18B"/>
  <circle cx="255" cy="192" r="4" fill="#F6D18B"/>
  <circle cx="265" cy="212" r="5" fill="#F6D18B"/>

  <!-- Dal bowl (top-right) -->
  <circle cx="395" cy="225" r="58" fill="#FFF3D6"/>
  <circle cx="395" cy="222" r="42" fill="#F4B740"/>
  <circle cx="395" cy="222" r="42" fill="#F4B740" opacity="0.9"/>
  <ellipse cx="395" cy="210" rx="34" ry="14" fill="#F7C868" opacity="0.7"/>

  <!-- Sabzi (bottom-left) -->
  <circle cx="245" cy="375" r="58" fill="#EAF7EF"/>
  <circle cx="228" cy="365" r="16" fill="#1C8C5A"/>
  <circle cx="255" cy="358" r="13" fill="#2F855A"/>
  <circle cx="252" cy="385" r="14" fill="#E7A33E"/>
  <circle cx="230" cy="392" r="11" fill="#1C8C5A"/>

  <!-- Salad/roti (bottom-right) -->
  <circle cx="395" cy="375" r="58" fill="#FBF6EC"/>
  <circle cx="395" cy="375" r="38" fill="#EFD9A6"/>
  <path d="M370 370c10-8 40-8 50 0" stroke="#DDBE7C" stroke-width="3" stroke-linecap="round"/>
  <path d="M372 385c10-6 36-6 46 0" stroke="#DDBE7C" stroke-width="3" stroke-linecap="round"/>

  <!-- Center garnish -->
  <circle cx="320" cy="300" r="17" fill="#1C8C5A"/>
  <path d="M320 288c4 4 4 12 0 16-4-4-4-12 0-16Z" fill="#F8FAFC"/>

  <!-- Floating badge: delivery time -->
  <g transform="translate(430,80)">
    <rect width="150" height="56" rx="16" fill="#1A202C"/>
    <circle cx="30" cy="28" r="14" fill="#1C8C5A"/>
    <path d="M30 20v9l6 4" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="54" y="24" font-family="Inter, sans-serif" font-size="12" fill="#CBD5E0">Delivered by</text>
    <text x="54" y="40" font-family="Sora, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1:00 PM Daily</text>
  </g>

  <!-- Floating badge: rating -->
  <g transform="translate(30,60)">
    <rect width="132" height="56" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="16" y="24" font-family="Sora, sans-serif" font-size="14" font-weight="700" fill="#1A202C">4.8 / 5</text>
    <text x="16" y="42" font-family="Inter, sans-serif" font-size="11" fill="#718096">1,200+ subscribers</text>
    <path d="M108 20l3.2 6.6 7.2.9-5.4 5 1.4 7.2-6.4-3.4-6.4 3.4 1.4-7.2-5.4-5 7.2-.9Z" fill="#F4B740"/>
  </g>
</svg>
